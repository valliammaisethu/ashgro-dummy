name: CI Pipeline

pr:
  branches:
    include:
      - "develop"
      - "qa"
      - "staging"

pool:
  vmImage: "ubuntu-latest"

variables:
  VITE_APP_API_BASE_URL: $(VITE_API_BASE_URL) # From variable group or pipeline variable

steps:
  # Step 1: Checkout the code
  - checkout: self

  # Step 2: Setup Node.js
  - task: NodeTool@0
    inputs:
      versionSpec: "18.12.1"
    displayName: "Install Node.js"

  # Step 3: Install dependencies
  - script: npm ci
    displayName: "Install dependencies"

  # Step 4: Run linter
  - script: npm run lint
    displayName: "Run linter"

  # Step 5: Run tests and coverage
  - script: npm run coverage
    displayName: "Run tests and collect coverage"
    env:
      VITE_APP_API_BASE_URL: "$(VITE_API_BASE_URL)"

  # Step 6: Build project
  - script: npm run build
    displayName: "Build project"
    env:
      VITE_APP_API_BASE_URL: $(VITE_API_BASE_URL)
